version: '3.9'

services:
  # ── Application Server ────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - '8080:8080'
    environment:
      - PORT=8080
      - MONGODB_URI=mongodb://mongo:27017/linkdrop
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=linkdrop
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - CORS_ORIGIN=http://localhost
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - TURN_SERVER=turn:coturn:3478
      - TURN_USER=linkdrop
      - TURN_PASSWORD=linkdrop
      - STUN_SERVER=stun:coturn:3478
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── MongoDB ───────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage) ──────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Nginx (reverse proxy) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    depends_on:
      - server
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ── coturn (TURN/STUN server for WebRTC) ─────────────────────
  coturn:
    image: coturn/coturn:latest
    ports:
      - '3478:3478'
      - '3478:3478/udp'
      - '49152-49200:49152-49200/udp'
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped

  # ── ClamAV (malware scanning) ────────────────────────────────
  clamav:
    image: clamav/clamav:stable
    ports:
      - '3310:3310'
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ['CMD', 'clamdcheck']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

volumes:
  mongo_data:
  minio_data:
  clamav_data:
