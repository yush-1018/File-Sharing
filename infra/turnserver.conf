# coturn TURN/STUN server configuration

# Listening port
listening-port=3478

# Realm
realm=linkdrop.local

# Authentication
lt-cred-mech
user=linkdrop:linkdrop

# Relay ports range
min-port=49152
max-port=49200

# Logging
log-file=stdout
verbose

# Fingerprint
fingerprint

# No TLS for development (enable in production with cert/key)
no-tls
no-dtls

# Allow localhost for development
allow-loopback-peers

# Total relay bandwidth (bytes per second)
total-quota=100

# Max bandwidth per session
bps-capacity=0

# Stale nonce
stale-nonce=600

# No multicast peers
no-multicast-peers
