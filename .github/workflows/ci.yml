name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm -r run lint
        continue-on-error: true # Just a warning if linter fails for now
      - run: pnpm -r build
      - run: pnpm -r test
        env:
          MONGODB_URI: mongodb://localhost:27017/linkdrop_test
          REDIS_URL: redis://localhost:6379
